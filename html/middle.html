<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>middle</title>
    <link rel="stylesheet" href="../css/middle.css" />
  </head>
  <body>
    <main class="game-wrapper">
      <section class="game-screen">
        <img src="../images/middle_basic.png" class="room-bg" />

        <button
          class="hotspot computer"
          onclick="openComputerModal()"
          aria-label="컴퓨터 조사"
        ></button>
        <button
          class="hotspot shelf"
          onclick="openShelfModal('shelf')"
          aria-label="선반 조사"
        ></button>
        <button
          class="hotspot plant"
          onclick="openInfoModal('plant')"
          aria-label="식물 조사"
        ></button>
        <button
          class="hotspot calender"
          onclick="openInfoModal('calender')"
          aria-label="캘린더 조사"
        ></button>
        <button
          class="hotspot drawer"
          onclick="openDrawerModal()"
          aria-label="서랍 조사"
        ></button>
        <button
          class="hotspot whiteboard"
          onclick="openWhitebordModal()"
          aria-label="화이트보드 조사"
        ></button>
        <button
          class="hotspot hint"
          onclick="openHint()"
          aria-label="힌트 열기"
        >
          HINT
        </button>
        <button
          class="hotspot screen-back"
          onclick="goPage('left')"
          aria-label="왼쪽 화면"
        >
          ◀
        </button>
        <button
          class="hotspot screen-front"
          onclick="goPage('right')"
          aria-label="오른쪽 화면"
        >
          ▶
        </button>

        <div class="inventory-bar">
          <button
            class="inventory-slot"
            data-slot="1"
            aria-label="아이템 슬롯 1"
          ></button>
          <button
            class="inventory-slot"
            data-slot="2"
            aria-label="아이템 슬롯 2"
          ></button>
          <button
            class="inventory-slot"
            data-slot="3"
            aria-label="아이템 슬롯 3"
          ></button>
          <button
            class="inventory-slot"
            data-slot="4"
            aria-label="아이템 슬롯 4"
          ></button>
          <button
            class="inventory-slot"
            data-slot="5"
            aria-label="아이템 슬롯 5"
          ></button>
          <button
            class="inventory-slot"
            data-slot="6"
            aria-label="아이템 슬롯 6"
          ></button>
          <button
            class="inventory-slot"
            data-slot="7"
            aria-label="아이템 슬롯 7"
          ></button>
          <button
            class="inventory-slot"
            data-slot="8"
            aria-label="아이템 슬롯 8"
          ></button>
        </div>

        <!-- shelf 모달 -->
        <div class="investigate-overlay hidden" id="shelfModal">
          <div class="shelf-modal">
            <div class="modal-image-frame">
              <button class="modal-back-btn" onclick="closeAllModals()">
                ←
              </button>

              <img
                src="../images/shelf5.png"
                class="shelf-modal-image"
                alt="선반 조사 화면"
              />
            </div>

            <!-- scope 획득 영역 -->
            <button
              class="modal-hotspot scope-area"
              onclick="getscope()"
              aria-label="스코프 획득"
            ></button>

            <p class="investigate-text">"현미경용 스코프가 있다."</p>
          </div>
        </div>

        <!-- drawer 모달 1 -->
        <div class="investigate-overlay hidden" id="drawerModal1">
          <div class="shelf-modal">
            <div class="modal-image-frame">
              <button class="modal-back-btn" onclick="closeAllModals()">
                ←
              </button>

              <img
                src="../images/drawer1.png"
                class="shelf-modal-image"
                alt="서랍 조사 화면"
              />
            </div>

            <!-- scope 획득 영역 -->
            <button
              class="modal-hotspot scope-area"
              onclick="getlight()"
              aria-label="손전등 획득"
            ></button>

            <p class="investigate-text">"손전등이 있다."</p>
          </div>
        </div>

        <!-- drawer 모달 2 -->
        <div class="investigate-overlay hidden" id="drawerModal2">
          <div class="shelf-modal">
            <div class="modal-image-frame">
              <button class="modal-back-btn" onclick="closeAllModals()">
                ←
              </button>
              <img
                src="../images/drawer2.png"
                class="shelf-modal-image"
                alt="서랍 조사 화면"
              />
            </div>

            <p class="investigate-text">“건전지가 들어있지 않다.”</p>
          </div>
        </div>

        <!-- 공통 조사 모달-->
        <div class="investigate-overlay hidden" id="infoModal">
          <div class="shelf-modal">
            <button class="modal-back-btn" onclick="closeAllModals()">←</button>

            <img id="infoModalImage" class="shelf-modal-image" />

            <p class="investigate-text" id="infoModalText"></p>
          </div>
        </div>
      </section>
    </main>

    <script src="../js/middle.js"></script>
  </body>
</html>
